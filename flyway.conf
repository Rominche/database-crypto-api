# Flyway configuration - database-crypto-api
# Credentials are provided via FLYWAY_URL / FLYWAY_USER / FLYWAY_PASSWORD env vars
# to avoid storing secrets in this file (NFR-S2)

flyway.locations=filesystem:/flyway/sql
flyway.connectRetries=60
flyway.mixed=false
flyway.outOfOrder=false
flyway.validateOnMigrate=true
